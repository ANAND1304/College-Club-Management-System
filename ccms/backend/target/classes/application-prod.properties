# =============================================
# Production profile — values come from env vars
# Run with: java -jar app.jar --spring.profiles.active=prod
# =============================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${CORS_ORIGINS}

# Disable stack traces in error responses
server.error.include-stacktrace=never
server.error.include-message=always

logging.level.root=WARN
logging.level.com.clubmanagement=INFO
